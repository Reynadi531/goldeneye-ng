# Production Docker Compose
#
# Routing topology:
#   Caddy (TLS + reverse proxy)
#     example.com/api/*  →  127.0.0.1:3000  (server container)
#     example.com/*      →  127.0.0.1:8080  (web / Nginx container)
#   Nginx serves the static SPA with try_files fallback.
#   postgres is internal-only, never exposed to the host.
#
# Usage:
#   cp .env.production.example .env.production
#   # fill in .env.production values
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d --build
#
# Before first deploy, run DB migrations:
#   docker compose -f docker-compose.production.yml --env-file .env.production \
#     exec server bun run /app/dist/index.mjs  # then trigger migrate separately via drizzle-kit

services:
  postgres:
    image: postgres:16-alpine
    container_name: goldeneye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # postgres is not exposed externally — only reachable by other services
    networks:
      - internal

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: goldeneye-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # Public URL of the API — used by better-auth for cookie domain / email redirects
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      # Public-facing web domain — Caddy routes /api/* directly to this container,
      # so the browser sees both web and API on the same origin (no CORS needed).
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Caddy reverse-proxies /api/* to this port on the host.
      # Bound to localhost only — not exposed to the public internet.
      - "127.0.0.1:3000:3000"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Vite bakes VITE_SERVER_URL into the JS bundle at build time.
        # With Caddy routing /api/* on the same origin, use a relative base ("" or "/")
        # so the frontend calls /api/* relative URLs — no CORS, no hardcoded domain.
        VITE_SERVER_URL: ${VITE_SERVER_URL}
    container_name: goldeneye-web
    restart: unless-stopped
    ports:
      # Caddy reverse-proxies /* to this port on the host.
      # Bound to localhost only — not exposed to the public internet.
      - "127.0.0.1:8080:80"
    depends_on:
      - server
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
