server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip — Caddy also compresses, but this handles any pass-through cases
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed static assets (Vite outputs content-hashed filenames)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|ico|svg|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unmatched paths serve index.html
    # /api/* is never reached here: Caddy routes it directly to the server container
    location / {
        try_files $uri $uri/ /index.html;
    }
}
